# Use DecapBridge PKCE auth (required)
backend:
  name: git-gateway
  repo: safe-n-tech/www
  branch: main
  auth_type: pkce
  base_url: https://auth.decapbridge.com
  auth_endpoint: /sites/c0dfe770-da7a-425f-a2bc-9f70b65e76ed/pkce
  auth_token_endpoint: /sites/c0dfe770-da7a-425f-a2bc-9f70b65e76ed/token
  gateway_url: https://gateway.decapbridge.com

  commit_messages:
    create: Create {{collection}} “{{slug}}”
    update: Update {{collection}} “{{slug}}”
    delete: Delete {{collection}} “{{slug}}”
    uploadMedia: Upload “{{path}}”
    deleteMedia: Delete “{{path}}”
    openAuthoring: Message {{message}}

auth:
  email_claim: email
  first_name_claim: first_name
  last_name_claim: last_name
  avatar_url_claim: avatar_url

logo_url: https://decapbridge.com/decapcms-with-bridge.svg

site_url: https://www.safe-n-tech.org

media_folder: 'assets/media'
public_folder: '/media'
locale: fr
slug:
  encoding: ascii
  clean_accents: true

collections:
  - name: thematiques
    slug: "{{fields.uuid}}"
    label: Thématiques
    label_singular: Thématique
    folder: content/thematiques
    create: true
    editor: { preview: false }
    filter: { field: "visibleInCms", value: true }
    fields:
      - { label: "Visible", name: "visibleInCms", widget: hidden, default: true }
      - { label: 'UUID', name: 'uuid', widget: uuid, prefix: thematique }
      - { label: Titre, name: title, pattern: ['.{0,100}', "Maximum 100 caractères"] }
      - { label: Icône (nom de fichier SVG/PNG), name: icon, required: false }
      - { label: Lien vidéo Youtube, name: videoUrl, required: false }
      - { label: Sous-titre, name: subtitle, required: false }
      - { label: Description, name: description, required: false, widget: text }

  # --- NOUVELLE COLLECTION : OUTILS ---
  - name: tools
    slug: "{{fields.uuid}}"
    label: Outils
    label_singular: Outil
    folder: content/tools
    create: true
    editor: { preview: false }
    filter: { field: "visibleInCms", value: true }
    identifier_field: name
    summary: "{{name}}"
    fields:
      - { label: "Visible", name: "visibleInCms", widget: hidden, default: true }
      - { label: 'UUID', name: 'uuid', widget: uuid, prefix: tool }
      - label: "Nom de l'outil"
        name: name
        widget: string
        hint: "Nom affiché de l'outil (ex. : Bitwarden, Proton Mail)."
      - label: "URL de l'outil"
        name: link
        widget: string
        pattern: ['^https://', "L'URL doit commencer par https://"]
        hint: "Lien officiel vers l'outil, commençant par https://"
      - label: "Description"
        name: description
        widget: text
        required: false
        hint: "Courte description de ce que fait l'outil."

  - name: good-practices
    slug: "{{fields.slug | default: fields.uuid}}"
    label: Bonnes pratiques
    label_singular: Bonne pratique
    folder: content/good-practices
    create: true
    editor: { preview: false }
    filter: { field: "visibleInCms", value: true }
    view_groups:
      - label: Thématique
        field: thematique
      - label: Niveau
        field: niveau
    view_filters:
      - label: Niveau basique
        field: niveau
        pattern: basique
      - label: Niveau essentiel
        field: niveau
        pattern: essentiel
      - label: Niveau avancé
        field: niveau
        pattern: avance
    fields:
      - { label: "Visible", name: "visibleInCms", widget: hidden, default: true }

      - { label: 'UUID', name: 'uuid', widget: uuid, prefix: "good-practice" }

      - label: Titre
        name: title
        widget: string
        hint: "Le titre est la consigne courte présentée à l'utilisateur (ex. : « Activez la double authentification »)."

      - { label: "Slug personnalisé (court, utilisé pour l'URL)", name: slug, required: false, pattern: ['^.{0,60}$', "Maximum 60 caractères"] }

      - label: Thématique
        name: thematique
        widget: relation
        collection: thematiques
        search_fields: [ "title" ]
        value_field: uuid
        display_fields: [ "title" ]
        hint: "Obligatoire : une bonne pratique sans thématique n'apparaît dans aucune checklist."

      - label: Niveau
        name: niveau
        widget: select
        options:
          - { label: Basique, value: basique }
          - { label: Essentiel, value: essentiel }
          - { label: Avancé, value: avance }
        default: basique

      - label: Risques encourus
        name: risks
        widget: markdown
        required: false
        hint: "Décrit ce qui peut arriver si on n'applique pas cette bonne pratique."

      - label: Ne pas faire
        name: dontDo
        widget: markdown
        required: false
        hint: "Comportement à éviter, formulé positivement comme un contre-exemple."

      # --- CHAMP OUTIL : désormais une RELATION (liste déroulante), plus un objet ---
      - label: Outil recommandé
        name: tool
        widget: relation
        collection: tools
        search_fields: [ "name" ]
        value_field: uuid
        display_fields: [ "name" ]
        required: false
        hint: "Sélectionnez un outil dans la liste. Pour en ajouter un nouveau, créez-le d'abord dans la collection « Outils »."

  - name: definitions
    slug: "{{fields.uuid}}"
    label: Définitions (glossaire)
    label_singular: Définition
    folder: content/definitions
    create: true
    editor: { preview: false }
    filter: { field: "visibleInCms", value: true }
    fields:
      - { label: "Visible", name: "visibleInCms", widget: hidden, default: true }
      - { label: 'UUID', name: 'uuid', widget: uuid, prefix: definition }
      - { label: Titre, name: title, pattern: ['.{0,100}', "Maximum 100 caractères"] }
      - { label: Contenu, name: contenu, widget: text, required: true }

  - name: questions
    slug: "{{fields.uuid}}"
    label: Questions du quiz
    label_singular: Question
    folder: content/questions
    create: true
    editor: { preview: false }
    filter: { field: "visibleInCms", value: true }
    identifier_field: text
    view_groups:
      - label: Thématique
        field: thematique
    fields:
      - { label: "Visible", name: "visibleInCms", widget: hidden, default: true }
      - { label: 'UUID', name: 'uuid', widget: uuid, prefix: question }
      - { label: Texte de la question, name: text, widget: string }
      - { label: Correction, name: correction, widget: markdown }

      - label: Thématique
        name: thematique
        widget: relation
        collection: thematiques
        search_fields: [ "title" ]
        value_field: uuid
        display_fields: [ "title" ]
        required: false

      - label: Bonnes pratiques associées
        name: goodPractices
        widget: relation
        collection: good-practices
        search_fields: [ "title" ]
        value_field: uuid
        display_fields: [ "title" ]
        multiple: true
        required: false

      - label: Choix de réponse
        name: choices
        widget: list
        fields:
          - { label: Texte, name: text }
          - { label: Bonne réponse, name: isCorrect, widget: boolean, default: false, required: false }

      - label: Quiz Culture Générale Cybercriminalité
        name: quizCultureGenerale
        widget: boolean
        default: false
        required: false
        hint: "Activer pour inclure cette question dans le quiz de culture générale sur la cybercriminalité"

  - name: pages
    label: Pages Spécifiques
    delete: false
    editor: { preview: false }
    files:
      - name: parents
        label: Espace Parents
        file: content/parents/_index.md
        fields:
          - { label: Titre, name: title, widget: string }
          - { label: Description, name: description, widget: text }
          - label: Sujets / Rubriques
            name: topics
            widget: list
            fields:
              - { label: Titre du sujet, name: title, widget: string }
              - { label: Résumé, name: summary, widget: string }
              - label: Sections détaillées
                name: sections
                widget: list
                fields:
                  - { label: Titre de la section, name: title, widget: string }
                  - { label: Type d'affichage, name: type, widget: select, options: [{label: "Texte", value: "text"}, {label: "Liste à puces", value: "list"}], default: "text" }
                  - { label: Contenu (Markdown), name: content, widget: text, required: false }
                  - { label: Lignes de la liste (Markdown), name: items, widget: list, field: {label: Ligne, name: item, widget: string}, required: false }
      
      - name: seniors
        label: Espace Seniors
        file: content/seniors/_index.md
        fields:
          - { label: Titre, name: title, widget: string }
          - { label: Description, name: description, widget: text }
          - label: Cartes de conseils
            name: cards
            widget: list
            fields:
              - { label: Titre, name: title, widget: string }
              - { label: Icône, name: icon, widget: select, options: [bell, document, heart] }
              - { label: Titre du danger, name: danger_title, widget: string }
              - { label: Texte du danger, name: danger_text, widget: text }
              - { label: Titre du réflexe, name: reflex_title, widget: string }
              - { label: Texte du réflexe, name: reflex_text, widget: text }
          - label: Contacts et réflexes
            name: phone_numbers
            widget: object
            fields:
              - { label: Titre principal, name: title, widget: string }
              - label: Services / Contacts
                name: services
                widget: list
                fields:
                  - { label: Nom du service, name: name, widget: string }
                  - { label: Numéro (optionnel), name: number, widget: string, required: false }
                  - { label: Informations / Conseils, name: info, widget: text, required: false }

      - name: mineurs
        label: Espace Mineurs & Ados
        file: content/mineurs/_index.md
        fields:
          - { label: Titre, name: title, widget: string }
          - { label: Description, name: description, widget: text }
          - label: Jeu CyberBorder
            name: cyberborder
            widget: object
            fields:
              - { label: Titre du jeu, name: title, widget: string }
              - { label: Introduction, name: intro, widget: text }
              - label: Scénarios du jeu
                name: scenarios
                widget: list
                fields:
                  - { label: ID, name: id, widget: number, value_type: int }
                  - { label: Question, name: question, widget: text }
                  - { label: Couleur correcte, name: correct, widget: select, options: [{label: "🟢 Vert", value: "green"}, {label: "🟠 Orange", value: "orange"}, {label: "🔴 Rouge", value: "red"}] }
                  - { label: Explication, name: explanation, widget: text }
          - label: Données Bancaires
            name: bancaire
            widget: object
            fields:
              - { label: Titre, name: title, widget: string }
              - { label: Introduction, name: text, widget: text }
              - { label: Règle d'or, name: rule, widget: string }
              - { label: Pourquoi (raisons), name: reasons, widget: list, field: {label: Raison, name: item, widget: string} }
              - { label: Le bon réflexe, name: reflex, widget: text }
          - label: Publication de photos
            name: photos
            widget: object
            fields:
              - { label: Titre, name: title, widget: string }
              - { label: Introduction, name: text, widget: text }
              - { label: Interdictions, name: forbidden, widget: list, field: {label: Interdiction, name: item, widget: string} }
              - { label: Dangers (raisons), name: reasons, widget: list, field: {label: Raison, name: item, widget: string} }
              - { label: Le bon réflexe, name: reflex, widget: text }
          - label: Que faire en cas de...
            name: que_faire
            widget: object
            fields:
              - { label: Titre principal, name: title, widget: string }
              - label: Scénarios
                name: cases
                widget: list
                fields:
                  - { label: Titre, name: name, widget: string }
                  - { label: Le danger, name: danger, widget: text }
                  - { label: Pour réagir, name: action, widget: text }
                  - { label: Ce que dit la loi, name: law, widget: string }
          - label: Reconnaître un brouteur
            name: brouteurs
            widget: object
            fields:
              - { label: Titre principal, name: title, widget: string }
              - label: Étapes / Signaux
                name: steps
                widget: list
                fields:
                  - { label: Titre de l'étape, name: title, widget: string }
                  - { label: Explication, name: text, widget: text }
              - { label: Réflexe de sécurité, name: reflex, widget: text }

      - name: aide_pro
        label: Espace Professionnels (Aide Pro)
        file: content/aide-pro/_index.md
        fields:
          - { label: Titre, name: title, widget: string }
          - { label: Description, name: description, widget: text }
          - label: Préconisations Cyber
            name: preconisations
            widget: list
            fields:
              - { label: Catégorie, name: category, widget: string }
              - { label: Recommandations, name: items, widget: list, field: {label: Recommandation, name: item, widget: string} }
          - label: Assurances Cyber
            name: assurances
            widget: object
            fields:
              - { label: Titre principal, name: title, widget: string }
              - { label: Introduction, name: intro, widget: text }
              - label: Niveaux de couverture
                name: levels
                widget: list
                fields:
                  - { label: Nom du niveau, name: name, widget: string }
                  - { label: Détails, name: text, widget: text }
          - label: Fiches Réflexes & Ressources
            name: tpme_kits
            widget: object
            fields:
              - { label: Titre principal, name: title, widget: string }
              - label: Fiches de réaction
                name: kits
                widget: list
                fields:
                  - { label: Nom de la fiche, name: name, widget: string }
                  - { label: Type (ex. Feuille réflexe), name: type, widget: string }
                  - { label: Description, name: description, widget: text }
              - label: Assureurs recommandés
                name: insurances
                widget: list
                fields:
                  - { label: Nom de l'assureur, name: name, widget: string }
                  - { label: URL, name: url, widget: string }

