<div id="menu-backdrop" class="hidden fixed z-40 top-0 w-full h-screen"></div>
<header id="site-header" class="fixed z-50 top-0 left-0 right-0 w-full h-auto">
    <div id="menu-navbar"
        class="z-50 items-center p-8 w-full drop-shadow-md h-auto text-white bg-white flex justify-between">

        <a href="/" class="text-primary"><span><img src="/svgs/logo_icon.svg" alt="Accueil" class="w-12"></span></a>

        <button class="md:hidden flex items-center justify-center gap-3 cursor-pointer items-center" id="menu-toggle"
            name="menu">
            <p class="text-label text-black text-xl">Menu</p>
            <img src="/svgs/icon_burger.svg" alt="Arrow icon" class="h-5">
        </button>

        <ul class="hidden md:flex text-dark_gray text-sm md:text-base items-center">
            {{ $currentPage := . }}
            {{ range .Site.Menus.header }}
            <li>
                <a href="{{ .URL }}" aria-selected="{{ eq $currentPage.Permalink (absURL .URL) }}"
                    class="py-3 px-4 text-secondary hover:bg-light_gray rounded-lg aria-selected:bg-secondary aria-selected:text-white">{{
                    .Name }}</a>
            </li>
            {{ end }}
            <li class="ml-2">
                <button id="theme-toggle" aria-label="Basculer thème clair/sombre"
                    class="p-2 rounded-lg hover:bg-light_gray transition-colors cursor-pointer">
                    <!-- Icône soleil (thème sombre actif → montrer soleil pour revenir au clair) -->
                    <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" class="hidden w-5 h-5 text-secondary" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="4"/>
                        <line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                        <line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                    </svg>
                    <!-- Icône lune (thème clair actif → montrer lune pour passer au sombre) -->
                    <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-secondary" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </li>
        </ul>
    </div>

    <div id="menu-links"
        class="hidden md:hidden flex flex-col absolute z-50 w-full drop-shadow-md rounded-b-md bg-white items-center gap-y-3 p-4">
        <ul class="w-full flex flex-col gap-2 text-sm text-black">
            {{ range .Site.Menus.header }}
            <li class="">
                <a href="{{ .URL }}" aria-selected="{{ eq $currentPage.Permalink (absURL .URL) }}"
                    class="bg-light_gray w-auto p-4 rounded-xl flex justify-between items-baseline aria-selected:bg-secondary aria-selected:text-white">
                    <span>{{ .Name }}</span>
                    <span><img src="/svgs/icon_forward.svg" alt="->"></span>
                </a>
            </li>
            {{ end }}
            <!-- Toggle thème mobile -->
            <li>
                <button id="theme-toggle-mobile" aria-label="Basculer thème clair/sombre"
                    class="bg-light_gray w-full p-4 rounded-xl flex justify-between items-center cursor-pointer">
                    <span id="theme-label-mobile" class="text-secondary font-medium">Thème sombre</span>
                    <span class="flex items-center gap-2">
                        <svg id="icon-sun-mobile" xmlns="http://www.w3.org/2000/svg" class="hidden w-5 h-5 text-secondary" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <circle cx="12" cy="12" r="4"/>
                            <line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/>
                            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                            <line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/>
                            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                        </svg>
                        <svg id="icon-moon-mobile" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-secondary" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                        </svg>
                    </span>
                </button>
            </li>
        </ul>
    </div>



</header>

<script>
    /* ---- Menu mobile ---- */
    const menuBackdrop = document.getElementById('menu-backdrop');
    const menuToggle = document.getElementById('menu-toggle');
    const menuLinks = document.getElementById('menu-links');
    const menuNavbar = document.getElementById('menu-navbar');

    menuToggle.addEventListener('click', toggleLinks)
    menuBackdrop.addEventListener('click', toggleLinks)

    function toggleLinks() {
        menuLinks.classList.toggle('hidden');
        menuBackdrop.classList.toggle('hidden');
        menuNavbar.classList.toggle('drop-shadow-md');
        menuNavbar.classList.toggle('rounded-b-lg');
    }

    /* ---- Gestion du thème clair / sombre ---- */
    const html = document.documentElement;
    const iconSun   = document.getElementById('icon-sun');
    const iconMoon  = document.getElementById('icon-moon');
    const iconSunM  = document.getElementById('icon-sun-mobile');
    const iconMoonM = document.getElementById('icon-moon-mobile');
    const labelM    = document.getElementById('theme-label-mobile');

    function applyThemeIcons(isDark) {
        if (isDark) {
            iconSun.classList.remove('hidden');
            iconMoon.classList.add('hidden');
            iconSunM.classList.remove('hidden');
            iconMoonM.classList.add('hidden');
            labelM.textContent = 'Thème clair';
        } else {
            iconSun.classList.add('hidden');
            iconMoon.classList.remove('hidden');
            iconSunM.classList.add('hidden');
            iconMoonM.classList.remove('hidden');
            labelM.textContent = 'Thème sombre';
        }
    }

    function toggleTheme() {
        const isDark = html.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        applyThemeIcons(isDark);
    }

    // Initialise les icônes selon le thème courant (déjà appliqué par le script anti-flash)
    applyThemeIcons(html.classList.contains('dark'));

    document.getElementById('theme-toggle').addEventListener('click', toggleTheme);
    document.getElementById('theme-toggle-mobile').addEventListener('click', toggleTheme);

    // Réagit aux changements du thème système si l'utilisateur n'a pas fait de choix manuel
    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        if (!localStorage.getItem('theme')) {
            html.classList.toggle('dark', e.matches);
            applyThemeIcons(e.matches);
        }
    });
</script>
