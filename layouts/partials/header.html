<div id="menu-backdrop" class="hidden fixed z-40 top-0 w-full h-screen"></div>
<header id="site-header" class="fixed z-50 top-0 left-0 right-0 w-full h-auto">
    <div id="menu-navbar"
        class="relative z-50 items-center p-4 w-full drop-shadow-md h-auto text-white bg-white flex justify-between">

        <!-- Gauche : burger + logo -->
        <div class="flex items-center gap-1">
            <button class="flex items-center justify-center cursor-pointer p-2" id="menu-toggle" name="menu">
                <img src="/svgs/icon_burger.svg" alt="Menu" class="h-5">
            </button>
            <a href="/" class="text-primary"><span><img src="/svgs/logo_icon.svg" alt="Accueil" class="w-12"></span></a>
        </div>

        <!-- Centre : barre de recherche -->
        <div id="navbar-search" class="absolute left-1/2 -translate-x-1/2 w-48 md:w-96">
            <div class="relative">
                <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-secondary opacity-40 pointer-events-none" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
                </svg>
                <input id="navbar-search-input" type="search" placeholder="Rechercher..."
                    autocomplete="off"
                    class="w-full pl-9 pr-4 py-2 bg-light_gray rounded-full text-sm text-secondary border border-transparent focus:border-primary focus:outline-none transition-colors"/>
            </div>
            <div id="navbar-search-results"
                class="hidden absolute top-full left-0 right-0 mt-2 bg-white rounded-xl shadow-lg z-[200] max-h-[60vh] overflow-y-auto p-1">
            </div>
        </div>

        <!-- Droite : toggle thème -->
        <div class="flex items-center gap-1">
            <button id="theme-toggle" aria-label="Basculer thème clair/sombre"
                class="p-2 rounded-lg hover:bg-light_gray transition-colors cursor-pointer">
                <svg id="icon-sun" xmlns="http://www.w3.org/2000/svg" class="hidden w-5 h-5 text-secondary" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <circle cx="12" cy="12" r="4"/>
                    <line x1="12" y1="2" x2="12" y2="4"/><line x1="12" y1="20" x2="12" y2="22"/>
                    <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
                    <line x1="2" y1="12" x2="4" y2="12"/><line x1="20" y1="12" x2="22" y2="12"/>
                    <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
                </svg>
                <svg id="icon-moon" xmlns="http://www.w3.org/2000/svg" class="w-5 h-5 text-secondary" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </div>
    </div>

    <div id="menu-links"
        class="hidden flex flex-col absolute z-50 w-full drop-shadow-md rounded-b-md bg-white items-center gap-y-3 p-4">
        <ul class="w-full flex flex-col gap-2 text-sm text-black">
            {{ $currentPage := . }}
            {{ range .Site.Menus.header }}
            <li>
                <a href="{{ .URL }}" aria-selected="{{ eq $currentPage.Permalink (absURL .URL) }}"
                    class="bg-light_gray w-auto p-4 rounded-xl flex justify-between items-baseline aria-selected:bg-secondary aria-selected:text-white">
                    <span>{{ .Name }}</span>
                    <span><img src="/svgs/icon_forward.svg" alt="->"></span>
                </a>
            </li>
            {{ end }}
        </ul>
    </div>

</header>

<script>
    /* ---- Menu burger ---- */
    const menuBackdrop = document.getElementById('menu-backdrop');
    const menuToggle   = document.getElementById('menu-toggle');
    const menuLinks    = document.getElementById('menu-links');
    const menuNavbar   = document.getElementById('menu-navbar');

    menuToggle.addEventListener('click', toggleLinks);
    menuBackdrop.addEventListener('click', toggleLinks);

    function toggleLinks() {
        menuLinks.classList.toggle('hidden');
        menuBackdrop.classList.toggle('hidden');
        menuNavbar.classList.toggle('drop-shadow-md');
        menuNavbar.classList.toggle('rounded-b-lg');
    }

    /* ---- Thème clair / sombre ---- */
    const html     = document.documentElement;
    const iconSun  = document.getElementById('icon-sun');
    const iconMoon = document.getElementById('icon-moon');

    function applyThemeIcons(isDark) {
        iconSun.classList.toggle('hidden', !isDark);
        iconMoon.classList.toggle('hidden', isDark);
    }

    function toggleTheme() {
        const isDark = html.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        applyThemeIcons(isDark);
    }

    applyThemeIcons(html.classList.contains('dark'));
    document.getElementById('theme-toggle').addEventListener('click', toggleTheme);

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', function(e) {
        if (!localStorage.getItem('theme')) {
            html.classList.toggle('dark', e.matches);
            applyThemeIcons(e.matches);
        }
    });

    /* ---- Recherche Pagefind ---- */
    var pagefindModule = null;

    function initPagefind() {
        if (pagefindModule) return Promise.resolve();
        return import('/pagefind/pagefind.js').then(function(m) {
            pagefindModule = m;
            return pagefindModule.init();
        }).catch(function() {});
    }

    var searchInput   = document.getElementById('navbar-search-input');
    var searchResults = document.getElementById('navbar-search-results');
    var searchDebounce;

    searchInput.addEventListener('focus', initPagefind);

    searchInput.addEventListener('input', function() {
        clearTimeout(searchDebounce);
        var q = this.value.trim();
        if (!q) {
            searchResults.classList.add('hidden');
            searchResults.innerHTML = '';
            return;
        }
        searchDebounce = setTimeout(function() {
            if (!pagefindModule) return;
            pagefindModule.search(q).then(function(res) {
                if (!res.results.length) {
                    searchResults.innerHTML = '<p class="px-4 py-3 text-sm text-secondary opacity-50">Aucun résultat</p>';
                    searchResults.classList.remove('hidden');
                    return;
                }
                Promise.all(res.results.slice(0, 8).map(function(r) { return r.data(); })).then(function(items) {
                    searchResults.innerHTML = items.map(function(item) {
                        var title = item.meta && item.meta.title
                            ? item.meta.title.replace(/ - Safe N Tech$/, '')
                            : item.url;
                        return '<a href="' + item.url + '" class="flex flex-col px-4 py-3 hover:bg-light_gray rounded-lg gap-0.5">'
                            + '<span class="font-medium text-sm text-secondary">' + title + '</span>'
                            + '<span class="text-xs text-secondary opacity-60 line-clamp-2">' + item.excerpt + '</span>'
                            + '</a>';
                    }).join('');
                    searchResults.classList.remove('hidden');
                });
            });
        }, 200);
    });

    document.addEventListener('click', function(e) {
        if (!document.getElementById('navbar-search').contains(e.target)) {
            searchResults.classList.add('hidden');
        }
    });

    searchInput.addEventListener('keydown', function(e) {
        if (e.key === 'Escape') {
            searchResults.classList.add('hidden');
            searchInput.value = '';
            searchInput.blur();
        }
    });

    document.addEventListener('keydown', function(e) {
        if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
            e.preventDefault();
            searchInput.focus();
            searchInput.select();
        }
    });
</script>
