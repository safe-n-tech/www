{{ define "main" }}
<section
  class="relative bg-[url('/images/bg-hero.png')] bg-cover bg-center bg-no-repeat flex flex-col align-center px-4 bg-secondary text-white">
  <div class="max-w-md md:ml-12 my-20">
    {{ partial "breadcrumb" (dict "page" . ) }}
  </div>
  <h1 class="h1 text-5xl font-semibold w-fit md:mx-auto max-w-screen-lg text-center">{{ .Title }}</h1>
  {{ if .Params.description }}
  <p class="w-fit mb-20 mx-auto my-7 text-center">{{ .Params.description }}</p>
  {{ else }}
  <div class="mb-20"></div>
  {{ end }}
</section>

<section class="container text-dark_gray flex flex-col gap-8 py-16">
  <div class="bg-white px-12 py-8 rounded-lg flex flex-col gap-6 text-label prose max-w-none">
    {{ if .Content }}
      {{ .Content }}
    {{ else }}
      <p>Contenu à venir...</p>
    {{ end }}
  </div>
</section>
{{ end }}
