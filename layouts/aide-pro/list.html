{{ define "main" }}

<section
  class="relative flex flex-col align-center px-4 text-white" style="background: linear-gradient(to bottom right, #153E60, #0449B8)">
  <div class="max-w-md md:ml-12 my-20">
    {{ partial "breadcrumb" (dict "page" . ) }}
  </div>
  <h1 class="h1 text-5xl font-semibold w-fit md:mx-auto max-w-screen-lg text-center">{{ .Title }}</h1>
  {{ if .Params.description }}
  <p class="w-fit mb-20 mx-auto my-7 text-center">{{ .Params.description }}</p>
  {{ else }}
  <div class="mb-20"></div>
  {{ end }}
</section>

<section class="container text-dark_gray flex flex-col gap-8 py-16">
  <div x-data="{ activeTab: 'assurance' }" class="bg-white rounded-lg overflow-hidden">

    <div class="flex border-b border-gray-200">
      <button
        @click="activeTab = 'assurance'"
        :class="activeTab === 'assurance' ? 'border-b-2 border-secondary text-secondary font-semibold' : 'text-gray-500 hover:text-secondary'"
        class="px-8 py-4 text-base transition-colors cursor-pointer">
        Assurance
      </button>
    </div>

    <div class="px-12 py-8">
      <div x-show="activeTab === 'assurance'" class="flex flex-col items-center gap-6">
        <img src="/images/matrice_cyber_risques.png" alt="Matrice synthétique des garanties cyber" class="max-w-full rounded-lg shadow-sm" />
      </div>
    </div>

  </div>
</section>
{{ end }}
